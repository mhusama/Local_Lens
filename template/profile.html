<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .profile-container {
      max-width: 1120px;
      margin: 40px auto;
      padding: 0 18px;
    }

    .profile-greeting {
      margin-bottom: 40px;
    }

    .greeting-text {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .greeting-name {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text);
      margin: 0;
    }

    .profile-cards {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(2, 1fr);
    }

    @media (max-width: 768px) {
      .profile-cards {
        grid-template-columns: 1fr;
      }
    }

    .profile-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .profile-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 30px rgba(0,0,0,0.12);
    }

    .card-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(129, 66, 245, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      margin: 0;
    }

    .card-description {
      font-size: 0.9rem;
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="brand" href="catalog.html">Local Lens</a>
      <form class="search" onsubmit="event.preventDefault();">
        <input type="search" placeholder="Search products" aria-label="Search products" />
        <button type="submit" aria-label="Search">🔍</button>
      </form>
      <div class="auth">
        <button id="sellerLoginBtn" type="button">Seller Login</button>
        <button id="loginBtn" type="button">Login</button>
        <button id="signupBtn" type="button">Signup</button>
      </div>
    </div>
  </header>

  <main>
    <div class="profile-container">
      <div class="profile-greeting">
        <div class="greeting-text">Hello,</div>
        <h1 class="greeting-name" id="user-name">Musayeb Hossain</h1>
      </div>

      <div class="profile-cards">
        <div class="profile-card" onclick="window.location.href='edit-profile.html'">
          <div class="card-icon">👤</div>
          <h2 class="card-title">Edit Profile</h2>
          <p class="card-description">Update your personal information</p>
        </div>

        <div class="profile-card" onclick="window.location.href='orders.html'">
          <div class="card-icon">📦</div>
          <h2 class="card-title">Orders</h2>
          <p class="card-description">View your order history</p>
        </div>

        <div class="profile-card" onclick="window.location.href='edit-address.html'">
          <div class="card-icon">📍</div>
          <h2 class="card-title">Edit Address</h2>
          <p class="card-description">Manage your addresses</p>
        </div>

        <div class="profile-card" onclick="window.location.href='edit-password.html'">
          <div class="card-icon">🔒</div>
          <h2 class="card-title">Edit Password</h2>
          <p class="card-description">Change your password</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Login / Seller Login Modals -->
  <div class="modal" id="modal-login" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="login-title">
      <div class="modal-header">
        <h2 id="login-title">Login</h2>
        <button class="modal-close" type="button" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="Enter your email" autocomplete="email" />
        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <div class="modal-footer">
        <button type="button" id="login-submit">Login</button>
      </div>
    </div>
  </div>

  <div class="modal" id="modal-seller-login" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="seller-login-title">
      <div class="modal-header">
        <h2 id="seller-login-title">Seller Login</h2>
        <button class="modal-close" type="button" data-close>&times;</button>
      </div>
      <div class="modal-body">
        <label for="seller-email">Email</label>
        <input id="seller-email" type="email" placeholder="Enter your business email" autocomplete="email" />
        <label for="seller-password">Password</label>
        <input id="seller-password" type="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <div class="modal-footer">
        <button type="button" id="seller-login-submit">Login</button>
        <button type="button" id="seller-signup-btn" class="modal-secondary">Not a Seller? Signup</button>
      </div>
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const sellerLoginBtn = document.getElementById('sellerLoginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const modalLogin = document.getElementById('modal-login');
    const modalSellerLogin = document.getElementById('modal-seller-login');

    function openModal(modal) {
      modal.classList.add('active');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeModal(modal) {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
    }

    loginBtn.addEventListener('click', () => openModal(modalLogin));
    sellerLoginBtn.addEventListener('click', () => openModal(modalSellerLogin));
    signupBtn.addEventListener('click', () => window.location.href = 'signup.html');

    document.querySelectorAll('[data-close]').forEach(button => {
      button.addEventListener('click', (event) => {
        const modal = event.target.closest('.modal');
        if (modal) closeModal(modal);
      });
    });

    document.querySelectorAll('.modal').forEach(modal => {
      modal.addEventListener('click', (event) => {
        if (event.target === modal) {
          closeModal(modal);
        }
      });
    });

    // Close on Esc
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        document.querySelectorAll('.modal.active').forEach(closeModal);
      }
    });

    // Demo behavior: close on submit
    document.getElementById('login-submit').addEventListener('click', () => closeModal(modalLogin));
    document.getElementById('seller-login-submit').addEventListener('click', () => closeModal(modalSellerLogin));
    document.getElementById('seller-signup-btn').addEventListener('click', () => {
      window.location.href = 'signup.html';
    });
  </script>
</body>
</html>
