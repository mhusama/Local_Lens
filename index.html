<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Lens — Nearby Shops</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">Nearby for you</p>
          <h1>Closest shops near your location</h1>
          <p class="description">
            Showing the nearest two stores for the current location
            <strong>23.840097100907304, 90.35833596879067</strong>.
          </p>
        </div>
        <div class="hero-image">
          <img src="images/fuchka_shop.jpg" alt="Fuchka shop" />
        </div>
      </section>

      <div class="status-message" id="statusMessage">Loading nearest shops…</div>
      <section class="cards-grid" id="cardsGrid"></section>
    </main>

    <script src="index.js"></script>
  </body>
</html>
