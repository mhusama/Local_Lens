<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Local_Lens</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>

<header class="header">

<div class="logo">Local_Lens</div>

<div class="search-box">

<input type="text" id="searchInput" placeholder="Search products...">

<button onclick="searchProduct()">
<i class="fa fa-search"></i>
</button>

</div>

<div class="icons">

<i class="fa fa-user"></i>
<i class="fa fa-heart"></i>
<i class="fa fa-shopping-cart"></i>

</div>

</header>


<!-- CATEGORY SIDEBAR -->

<div class="main-container">

<div class="categories">

<ul>

<li>Groceries</li>
<li>Health & Beauty</li>
<li>Men Fashion</li>
<li>Women Fashion</li>
<li>Watches</li>
<li>Electronics</li>
<li>Home Appliances</li>
<li>Sports</li>

</ul>

</div>



<!-- SLIDER -->

<div class="slider">

<img id="slideImage" src="images/banner1.jpg">

</div>

</div>


<!-- FLASH SALE -->

<section class="flash-sale">

<h2>Flash Sale</h2>

<div class="product-container" id="productContainer">


<div class="product">

<img src="images/p1.jpg">

<h4 class="product-title">Milk Powder</h4>

<p class="price">৳679</p>

</div>


<div class="product">

<img src="images/p2.jpg">

<h4 class="product-title">Mosquito Refill</h4>

<p class="price">৳215</p>

</div>


<div class="product">

<img src="images/p3.jpg">

<h4 class="product-title">Rice Bran Oil</h4>

<p class="price">৳107</p>

</div>


<div class="product">

<img src="images/p4.jpg">

<h4 class="product-title">Body Spray</h4>

<p class="price">৳184</p>

</div>


<div class="product">

<img src="images/p5.jpg">

<h4 class="product-title">Water Bottle</h4>

<p class="price">৳97</p>

</div>

</div>

</section>


</body>

<script src="script.js"></script>

</html>
